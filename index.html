<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title> Tip calculator </title>
</head>

<body>
    <div class="hero bg-base-200 min-h-screen">
        <div class="hero-content text-center">
            <div class="max-w-md">
                <h1 class="text-5xl font-bold">Hello there</h1>
                <form class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
                    <fieldset class="fieldset">
                        <label class="label">Accout Name</label>
                        <input type="text" id="emailInput" class="input validator" placeholder="Your ID" required />
                        <p class="validator-hint hidden">Required</p>
                    </fieldset>

                    <label class="fieldset">
                        <span class="label">Password</span>
                        <input type="password" id="inputPassword" class="input validator" placeholder="Password"
                            required />
                        <span class="validator-hint hidden">Required</span>
                    </label>

                    <button class="btn btn-neutral mt-4" id="inpBtn" type="submit">Login</button>
                    <button class="btn btn-ghost mt-1" type="reset">Reset</button>
                </form>

            </div>
        </div>
    </div>





    <script src="script.js"></script>
    <script src="login.js"></script>
</body>

</html>
