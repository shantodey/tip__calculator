<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title> Tip calculator </title>
</head>

<body>
    <div class="hero bg-base-200 min-h-screen">
        <div class="hero-content text-center">
            <div class="max-w-md">
                <h1 class="text-5xl font-bold"> Calculate Your Tip</h1>
                <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">

                    <label class="label capitalize">Put the bil</label>
                    <input type="number" class="input" id="bill" placeholder="Your Bill" />

                    <label class="label capitalize"> Percent Of Tip</label>
                    <input type="number" class="input" id="tip" placeholder="TIP Percentage" />

                    <button class="btn btn-neutral mt-4" id="calculate">Calculate</button>
                </fieldset>

            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
